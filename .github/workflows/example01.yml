name: example 01

on:
  pull_request:
      types:
        - closed

jobs:
  example01:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: run github cli
        run: gh pr comment $NUM_REQUEST --body "Votre PR ne sera pas mergé, veuillez modifier votre code et ouvrir une nouvelle PR"
        env:
          GH_TOKEN: ${{secrets.TOKEN_GITHUB}}
          # NUM_REQUEST: ${{github.event.number}}
          NUM_REQUEST: 18

      - name: as succeful
        run: echo "succeful"


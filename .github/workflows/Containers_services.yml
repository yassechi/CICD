name: Containers & services

on:
  workflow_dispatch:

jobs:
  create_container_service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        uses: actions/setup-node@v4
        with:
          node-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Check node version
        run: node -v

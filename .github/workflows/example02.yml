name: Auto Format & Lint on PR

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 🔧 FORMAT
      - name: Show changed files (clean output)
        run: |
          echo "📂 Changed files:"
          CHANGED=$(git diff --name-only)

          if [ -z "$CHANGED" ]; then
            echo "✅ No files changed"
          else
            for file in $CHANGED; do
              echo "$file (changed)"
            done
          fi

      # 🔍 LINT
      - name: Lint fix (ESLint)
        run: |
          echo "🔍 Running ESLint..."
          npx eslint . --ext .ts,.html --fix

      # 👀 VOIR LES MODIFS
      - name: Show changes
        run: |
          echo "📂 Modified files:"
          git diff --name-only

      # 📤 COMMIT SI NECESSAIRE
      - name: Commit changes if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            echo "🚀 Committing changes..."
            git commit -m "chore: auto format & lint"
            git push
          fi

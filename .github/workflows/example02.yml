name: Auto Format & Lint on PR

on:
  pull_request:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format code (Prettier)
        run: npx prettier --write "src/**/*.{ts,html,scss,json}"

      - name: Lint fix (ESLint)
        run: npx eslint . --ext .ts,.html --fix

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: auto format & lint"
          git push

#
